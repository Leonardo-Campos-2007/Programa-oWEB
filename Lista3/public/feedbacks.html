<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Feedbacks</title>
</head>
<body>
    <h1>Feedbacks recebidos</h1>
    <ul id="lista"></ul>

    <script>
        fetch('/feedbacks')
            .then(res => res.json())
            .then(dados => {
                const lista = document.getElementById('lista')
                dados.forEach(item => {
                    lista.innerHTML += `<li><strong>${item.nome}:</strong> ${item.feedback}</li>`
                })
            })
    </script>
</body>
</html>
